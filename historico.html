<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Histórico | ControlBike</title>

<style>

*{
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: #2c3e50;
    margin: 0;
    padding: 40px;
}

.container{
    background: white;
    padding: 30px;
    max-width: 1000px;
    margin: auto;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
}

.top-bar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.titulo {
    font-size: 26px;
    color: #2c3e50;
    display: flex;
    align-items: center;
    gap: 10px;
}

.titulo-texto {
    position: relative;
    padding-bottom: 6px;
}

.titulo-texto::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 4px;
    width: 354px;
    height: 2px;
    background: #34495e;
    border-radius: 2px;
}

.btn-voltar {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #2c3e50;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 500;
    font-size: 16px;
}

.btn-voltar:hover {
    background: #34495e;
    transform: scale(1.05);
}

#buscarHistorico{
    width: 46%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 20px;
    border: 2px solid #ccc;
    font-size: 16px;
    outline: none;
}

table{
    width: 100%;
    border-collapse: collapse;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
}

tr:hover{
    background: rgba(10, 126, 204, 0.3) !important;
    transition: 0.2s;
}

th{
    background: #2c3e50;
    color: white;
    padding: 10px;
}

td{
    padding: 10px;
    text-align: center;
}

th, td {
    border-bottom: 1px solid #ddd;
}

th:not(:last-child), td:not(:last-child) {
    border-right: 1px solid #ddd;
}

.tipo-entrada, .tipo-saida, .tipo-ajuste {
    font-weight: bold;
}

.tipo-entrada i, .tipo-saida i, .tipo-ajuste i {
    vertical-align: middle;
    margin-right: 6px;
}

.tipo-entrada { color: green; }
.tipo-saida { color: red; }
.tipo-ajuste { color: orange; }

.tipo-wrapper {
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.topo-filtros {
    display: flex;
    align-items: center;
    gap: 10px;
}

.filtros-box {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
}

.filtros-data{
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    justify-content: flex-start;
}

.filtros-data button{
    padding: 8px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #2c3e50;
    color: #ecf0f1;
    transition: 0.2s;
}

.filtros-data button:hover{
    background: #34495e;
    transform: scale(1.05);
}

.filtros-data button.ativo{
    background: #27ae60;
}

.filtro-personalizado{
    display: flex;
    gap: 10px;
    align-items: flex-end;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.filtro-personalizado input, .filtro-personalizado button{
    padding: 10px 12px;
    border-radius: 20px;
    border: none;
}

.filtro-personalizado button{
    background: #2c3e50;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.filtro-personalizado button:hover{
    background: #34495e;
    transform: scale(1.05);
}

.campo-data{
    display: flex;
    flex-direction: column;
    font-size: 14px;
    color: #2c3e50;
}

.campo-data input{
    padding: 8px;
    border-radius: 20px;
    border: 2px solid #ccc;
    outline: none;
}

</style>

</head>

<link rel="icon" type="png" href="/img/LogoBike.webp">

<body>

<div class="container">

<div class="top-bar">
    <h2 class="titulo">
        <i data-lucide="history"></i>
        <span class="titulo-texto">Histórico de Movimentações</span>
    </h2>
    <button class="btn-voltar" onclick="voltar()">
        <i data-lucide="arrow-left"></i>
        Voltar
    </button>
</div>

<div class="filtros-box">

    <div class="topo-filtros">
        <input type="text" id="buscarHistorico" placeholder="🔎 Buscar no histórico..." onkeyup="filtrarHistorico()">

        <div class="filtros-data">
            <button onclick="ativarBotao(this, 'hoje')">Hoje</button>
            <button onclick="ativarBotao(this, '7dias')">7 dias</button>
            <button onclick="ativarBotao(this, 'mes')">Este mês</button>
            <button onclick="ativarBotao(this, 'todos')">Todos</button>
        </div>
    </div>

    <div class="filtro-personalizado">
        <div class="campo-data">
            <label for="dataInicio">De</label>
            <input type="date" id="dataInicio">
        </div>

        <div class="campo-data">
            <label for="dataFim">Até</label>
            <input type="date" id="dataFim">
        </div>

        <button class="btn-filtrar" onclick="filtrarPorData()">Filtrar</button>
        <button class="btn-limpar" onclick="limparFiltro()">Limpar</button>
    </div>

</div>

<table>
<thead>
<tr>
<th>Produto</th>
<th>Tipo</th>
<th>Quantidade</th>
<th>Data</th>
</tr>
</thead>

<tbody id="corpoHistorico"></tbody>

</table>

</div>

<script>

const usuario = localStorage.getItem("usuario");

function getHeaders(){
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("token")
    }
}

if(!usuario){
    window.location.href = "login.html";
}

function voltar(){
    window.location.href = "index.html"
}

let mostrarTodos = true;

function carregarHistorico(){

fetch("http://localhost:3000/historico", {
    headers: getHeaders()
})
.then(res => res.json())
.then(dados => {

const tbody = document.getElementById("corpoHistorico")
tbody.innerHTML = ""

let lista = dados

if(!mostrarTodos){
    lista = dados.slice(0, limiteHistorico)
} else {
    lista = dados
}

lista.forEach(item => {

let classeTipo = ""
let icone = ""

const tipo = item.tipo.toLowerCase()

if(tipo.includes("venda")){
    classeTipo = "tipo-saida"
    icone = '<i data-lucide="shopping-cart"></i>'
}

if(tipo.includes("excluído")){
    classeTipo = "tipo-saida"
    icone = '<i data-lucide="trash-2"></i>'
}

if(tipo.includes("aumento")){
    classeTipo = "tipo-entrada"
    icone = '<i data-lucide="arrow-up-circle"></i>'
}

if(tipo.includes("novo")){
    classeTipo = "tipo-entrada"
    icone = '<i data-lucide="plus-circle"></i>'
}

if(tipo.includes("ajuste")){
    classeTipo = "tipo-ajuste"
    icone = '<i data-lucide="settings"></i>'
}

const dataFormatada = new Date(item.data).toLocaleString()

const linha = `
<tr>
<td>${item.produto}</td>
<td class="${classeTipo}">
    <span class="tipo-wrapper">${icone} ${item.tipo}</span>
</td>
<td class="${Number(item.quantidade) > 0 ? 'tipo-entrada' : 'tipo-saida'}">
    ${Number(item.quantidade) > 0 ? "+" + item.quantidade : item.quantidade}
</td>
<td data-data="${item.data}">${dataFormatada}</td>
</tr>
`

tbody.innerHTML += linha

})

lucide.createIcons()

})

}

function filtrarHistorico(){

const busca = document.getElementById("buscarHistorico").value.toLowerCase()
const linhas = document.querySelectorAll("#corpoHistorico tr")

linhas.forEach(linha => {

const texto = linha.innerText.toLowerCase()
linha.style.display = texto.includes(busca) ? "" : "none"

})

}

function filtrarPorPeriodo(tipo){

    const linhas = document.querySelectorAll("#corpoHistorico tr")
    const agora = new Date()

    linhas.forEach(linha => {

        const dataTexto = linha.children[3].getAttribute("data-data")
        const dataItem = new Date(dataTexto)

        let mostrar = false

        if(tipo === "hoje"){
            mostrar = dataItem.toDateString() === agora.toDateString()
        }

        if(tipo === "7dias"){
            const seteDias = new Date()
            seteDias.setDate(agora.getDate() - 7)
            mostrar = dataItem >= seteDias
        }

        if(tipo === "mes"){
            mostrar = dataItem.getMonth() === agora.getMonth() &&
                      dataItem.getFullYear() === agora.getFullYear()
        }

        if(tipo === "todos"){
            mostrar = true
        }

        linha.style.display = mostrar ? "" : "none"

    })

}

let filtroAtivo = null;

function ativarBotao(botao, tipo) {
    const botoes = document.querySelectorAll(".filtros-data button");

    if (filtroAtivo === tipo) {
        botao.classList.remove("ativo");
        filtroAtivo = null;

        mostrarTodos = true;
        carregarHistorico();

        return;
    }

    botoes.forEach(btn => btn.classList.remove("ativo"));

    botao.classList.add("ativo");
    filtroAtivo = tipo;

    mostrarTodos = true;
    carregarHistorico();

    setTimeout(() => {
        filtrarPorPeriodo(tipo);
    }, 100);
}

function filtrarPorData(){

    const inicio = document.getElementById("dataInicio").value
    const fim = document.getElementById("dataFim").value

    const linhas = document.querySelectorAll("#corpoHistorico tr")

    linhas.forEach(linha => {

        const dataTexto = linha.children[3].getAttribute("data-data")
        const dataItem = new Date(dataTexto)

        let mostrar = true

        if(inicio){
            const dataInicio = new Date(inicio)
            if(dataItem < dataInicio){
                mostrar = false
            }
        }

        if(fim){
            const dataFim = new Date(fim)
            dataFim.setHours(23,59,59)
            if(dataItem > dataFim){
                mostrar = false
            }
        }

        linha.style.display = mostrar ? "" : "none"

    })

}

function limparFiltro(){

    document.getElementById("dataInicio").value = ""
    document.getElementById("dataFim").value = ""

    filtroAtivo = null;
    mostrarTodos = false;

    carregarHistorico()
}

carregarHistorico()

</script>

<script src="https://unpkg.com/lucide@latest"></script>

</body>
</html>
